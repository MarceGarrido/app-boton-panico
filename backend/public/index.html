<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAIP - Centro de Monitoreo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.7);
            --primary: #f5d000;
            --primary-hover: #ffdf33;
            --text-light: #f0f0f5;
            --text-muted: #9ba1a6;
            --danger: #ff3b30;
            --success: #34c759;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(245, 208, 0, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 59, 48, 0.03) 0%, transparent 25%);
        }

        /* HEADER */
        header {
            padding: 20px 40px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(245, 208, 0, 0.3);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(0.9); }
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--glass-shadow);
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: 900;
            font-size: 24px;
            margin: 0 auto 24px auto;
            box-shadow: 0 0 30px rgba(245, 208, 0, 0.2);
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(245, 208, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 208, 0, 0.3);
        }

        /* MAIN CONTENT */
        main {
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .alerts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .alert-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .alert-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .alert-card.nueva {
            border-color: rgba(255, 59, 48, 0.5);
            background: linear-gradient(145deg, rgba(20,20,30,0.8) 0%, rgba(40,10,10,0.6) 100%);
            animation: border-pulse 2s infinite;
        }

        @keyframes border-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .alert-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-nueva { background: rgba(255, 59, 48, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 59, 48, 0.3); }
        .badge-atendida { background: rgba(52, 199, 89, 0.2); color: #8ee0a1; border: 1px solid rgba(52, 199, 89, 0.3); }
        .badge-falsa { background: rgba(255, 255, 255, 0.1); color: #ddd; border: 1px solid rgba(255, 255, 255, 0.2); }

        .alert-time {
            font-size: 13px;
            color: var(--text-muted);
        }

        .alert-body h3 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .alert-body p {
            margin-bottom: 6px;
            font-size: 15px;
            color: #d1d1d6;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-body p svg {
            color: var(--text-muted);
        }

        .alert-actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            flex: 1;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            box-shadow: none;
        }

        .btn-map {
            background: rgba(245, 208, 0, 0.15);
            color: var(--primary);
            border: 1px solid rgba(245, 208, 0, 0.3);
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            flex: 1;
            transition: all 0.3s;
        }

        .btn-map:hover {
            background: rgba(245, 208, 0, 0.25);
            transform: translateY(-2px);
        }

        .alert-note {
            margin-top: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-left: 3px solid var(--text-muted);
            border-radius: 4px 8px 8px 4px;
            font-size: 14px;
            font-style: italic;
            color: var(--text-muted);
        }

        /* RESOLVE MODAL */
        #resolve-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #resolve-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--glass-shadow);
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .status-options {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
        }

        .status-btn.selected-atendida {
            background: rgba(52, 199, 89, 0.2);
            border-color: #34c759;
            color: #8ee0a1;
        }

        .status-btn.selected-falsa {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ddd;
        }

        textarea {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            min-height: 120px;
            resize: vertical;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo">BAIP</div>
            <h2 style="margin-bottom: 24px;">Centro de Monitoreo</h2>
            <div class="input-group">
                <label>Contraseña de acceso</label>
                <input type="password" id="password-input" placeholder="••••••••">
            </div>
            <button onclick="login()">Ingresar al Panel</button>
            <p id="login-error" style="color: var(--danger); margin-top: 12px; font-size: 14px; display: none;">Contraseña incorrecta</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <header>
        <div class="logo-container">
            <div class="logo-circle">BAIP</div>
            <h1>Centro de Monitoreo Central</h1>
        </div>
        <div class="status-indicator">
            <div class="status-dot"></div>
            Conectado
        </div>
    </header>

    <main>
        <div class="alerts-grid" id="alerts-container">
            <!-- Las alertas se inyectarán aquí -->
        </div>
    </main>

    <!-- Modal Resolver Alerta -->
    <div id="resolve-modal">
        <div class="modal-content">
            <h2>Resolver Alerta</h2>
            <p style="color: var(--text-muted); margin-bottom: 16px;">Selecciona el estado final y agrega una nota describiendo la acción tomada.</p>
            
            <div class="status-options">
                <button class="status-btn" id="btn-atendida" onclick="selectStatus('ATENDIDA')">✅ Atendida / Móvil Enviado</button>
                <button class="status-btn" id="btn-falsa" onclick="selectStatus('FALSA_ALARMA')">❌ Falsa Alarma</button>
            </div>

            <textarea id="resolve-note" placeholder="Escribe los detalles de la resolución aquí... (Ej: Se envió el móvil 45 y se verificó que todo estaba en orden)"></textarea>

            <div class="modal-actions">
                <button class="btn-outline" onclick="closeModal()">Cancelar</button>
                <button onclick="submitResolution()">Guardar Resolución</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let currentPassword = localStorage.getItem('baip_pwd') || '';
        let socket;
        let selectedAlertId = null;
        let selectedStatus = 'ATENDIDA';
        const audioAlarm = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // Simple beep for demo

        // Init check
        if (currentPassword) {
            connectAndLoad();
        }

        async function login() {
            const pwd = document.getElementById('password-input').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                if (res.ok) {
                    currentPassword = pwd;
                    localStorage.setItem('baip_pwd', pwd);
                    document.getElementById('login-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('login-screen').style.display = 'none', 500);
                    connectAndLoad();
                } else {
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (e) {
                console.error(e);
            }
        }

        function connectAndLoad() {
            document.getElementById('login-screen').style.display = 'none';
            socket = io();
            
            socket.on('nueva_alerta', (alerta) => {
                audioAlarm.play().catch(e => console.log('Audio error (interaction required)'));
                loadAlerts(); // simple reload
            });

            socket.on('alerta_actualizada', () => {
                loadAlerts();
            });

            loadAlerts();
        }

        async function loadAlerts() {
            try {
                const res = await fetch('/api/alertas');
                const alertas = await res.json();
                renderAlerts(alertas);
            } catch (e) {
                console.error('Error fetching alerts', e);
            }
        }

        function renderAlerts(alertas) {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';

            alertas.forEach(a => {
                const isNew = a.estado === 'NUEVA';
                const badgeClass = a.estado === 'NUEVA' ? 'badge-nueva' : (a.estado === 'ATENDIDA' ? 'badge-atendida' : 'badge-falsa');
                const date = new Date(a.createdAt).toLocaleString('es-AR', { dateStyle: 'short', timeStyle: 'short' });
                
                let mapBtn = '';
                if (a.lat && a.lon) {
                    mapBtn = `<a href="https://www.google.com/maps?q=${a.lat},${a.lon}" target="_blank" class="btn-map">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg> Ver Mapa
                    </a>`;
                }

                let resolveBtn = '';
                if (isNew) {
                    resolveBtn = `<button class="btn-outline" onclick="openModal('${a.id}')">Resolver</button>`;
                }

                let noteHtml = '';
                if (a.nota) {
                    noteHtml = `<div class="alert-note">"${a.nota}"</div>`;
                }

                const card = document.createElement('div');
                card.className = `alert-card ${isNew ? 'nueva' : ''}`;
                card.innerHTML = `
                    <div class="alert-header">
                        <span class="alert-badge ${badgeClass}">${a.estado}</span>
                        <span class="alert-time">${date}</span>
                    </div>
                    <div class="alert-body">
                        <h3>${a.nombre}</h3>
                        <p>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            ${a.direccion}
                        </p>
                        <p>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            ${a.telefono}
                        </p>
                    </div>
                    ${noteHtml}
                    <div class="alert-actions">
                        ${mapBtn}
                        ${resolveBtn}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Modal Logic
        function openModal(id) {
            selectedAlertId = id;
            document.getElementById('resolve-modal').classList.add('active');
            document.getElementById('resolve-note').value = '';
            selectStatus('ATENDIDA');
        }

        function closeModal() {
            document.getElementById('resolve-modal').classList.remove('active');
            selectedAlertId = null;
        }

        function selectStatus(status) {
            selectedStatus = status;
            document.getElementById('btn-atendida').className = 'status-btn ' + (status === 'ATENDIDA' ? 'selected-atendida' : '');
            document.getElementById('btn-falsa').className = 'status-btn ' + (status === 'FALSA_ALARMA' ? 'selected-falsa' : '');
        }

        async function submitResolution() {
            if (!selectedAlertId) return;
            const nota = document.getElementById('resolve-note').value;
            
            try {
                await fetch(`/api/alertas/${selectedAlertId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        estado: selectedStatus, 
                        nota: nota,
                        password: currentPassword 
                    })
                });
                closeModal();
            } catch (e) {
                console.error(e);
                alert('Error al guardar resolución');
            }
        }
    </script>
</body>
</html>
